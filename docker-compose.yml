services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: products
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d products"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  kafka-broker-1:
    image: bitnamilegacy/kafka:latest
    container_name: kafka-broker-1
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-1:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9094:9094"
    networks:
      - app-network
    restart: unless-stopped

  kafka-broker-2:
    image: bitnamilegacy/kafka:latest
    container_name: kafka-broker-2
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 2
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9095
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:9092,EXTERNAL://localhost:9095
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9095:9095"
    networks:
      - app-network
    restart: unless-stopped

  kafka-broker-3:
    image: bitnamilegacy/kafka:latest
    container_name: kafka-broker-3
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 3
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9096
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-3:9092,EXTERNAL://localhost:9096
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka-broker-1:9093,2@kafka-broker-2:9093,3@kafka-broker-3:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: 7Dvn0OLMQo-bg4qmCmflVg
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9096:9096"
    networks:
      - app-network
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      KAFKA_CLUSTERS_0_READONLY: false
      KAFKA_CLUSTERS_0_TOPIC_AUTO_CREATE: true
    ports:
      - "8080:8080"
    depends_on:
      - kafka-broker-1
      - kafka-broker-2
      - kafka-broker-3
    networks:
      - app-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    environment:
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_ZGVzdGluZWQtc3VuZmlzaC0zOC5jbGVyay5hY2NvdW50cy5kZXYk}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_j1GbglNvAMV9QlqTtT2U6Syb9oHebGM0mPWLibNQdA}
      KAFKA_BROKERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      AUTH_CORS_ORIGIN: ${EC2_PUBLIC_IP:-http://localhost:3003}
    ports:
      - "8003:8003"
    depends_on:
      kafka-broker-1:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: apps/product-service/Dockerfile
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/products?schema=public
      KAFKA_BROKERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_ZGVzdGluZWQtc3VuZmlzaC0zOC5jbGVyay5hY2NvdW50cy5kZXYk}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_j1GbglNvAMV9QlqTtT2U6Syb9oHebGM0mPWLibNQdA}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-broker-1:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_ZGVzdGluZWQtc3VuZmlzaC0zOC5jbGVyay5hY2NvdW50cy5kZXYk}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_j1GbglNvAMV9QlqTtT2U6Syb9oHebGM0mPWLibNQdA}
    ports:
      - "8001:8001"
    depends_on:
      kafka-broker-1:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_ZGVzdGluZWQtc3VuZmlzaC0zOC5jbGVyay5hY2NvdW50cy5kZXYk}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_j1GbglNvAMV9QlqTtT2U6Syb9oHebGM0mPWLibNQdA}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      kafka-broker-1:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  email-service:
    build:
      context: .
      dockerfile: apps/email-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka-broker-1:9092,kafka-broker-2:9092,kafka-broker-3:9092
    depends_on:
      kafka-broker-1:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        NEXT_PUBLIC_PRODUCT_SERVICE_URL: http://${EC2_PUBLIC_IP:-localhost}:8000
        NEXT_PUBLIC_ORDER_SERVICE_URL: http://${EC2_PUBLIC_IP:-localhost}:8001
        NEXT_PUBLIC_PAYMENT_SERVICE_URL: http://${EC2_PUBLIC_IP:-localhost}:3000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_ZGVzdGluZWQtc3VuZmlzaC0zOC5jbGVyay5hY2NvdW50cy5kZXYk}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /
        NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_51Svs6M2cjzf4WKK7gJwQ01TQ6UWWUUjf0k0CCJSnwfTNKUNv8HLcY1LBekCij6cR6Z0IqAbCtZdAI05CJQYI56GQ00sxTVydNX}
        NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=512}
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_j1GbglNvAMV9QlqTtT2U6Syb9oHebGM0mPWLibNQdA}
    ports:
      - "3002:3002"
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
    networks:
      - app-network
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_PRODUCT_SERVICE_URL: http://${EC2_PUBLIC_IP:-localhost}:8000
        NEXT_PUBLIC_ORDER_SERVICE_URL: http://${EC2_PUBLIC_IP:-localhost}:8001
        NEXT_PUBLIC_PAYMENT_SERVICE_URL: http://${EC2_PUBLIC_IP:-localhost}:3000
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_ZGVzdGluZWQtc3VuZmlzaC0zOC5jbGVyay5hY2NvdW50cy5kZXYk}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
        NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-doo4ilqwx}
        NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=512}
    environment:
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_j1GbglNvAMV9QlqTtT2U6Syb9oHebGM0mPWLibNQdA}
    ports:
      - "3003:3003"
    depends_on:
      - auth-service
      - product-service
      - order-service
      - payment-service
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
